# fly.toml app configuration file generated for trek-zvaxiw on 2026-04-20T02:32:46Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'trek-zvaxiw'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[mounts]]
  source = 'trek_data'
  destination = '/app/data'
# /app/uploads is collapsed onto /app/data via a symlink at container
# startup (see Dockerfile CMD) because Fly shared-cpu machines only
# support a single volume mount. One volume keeps things simple.
